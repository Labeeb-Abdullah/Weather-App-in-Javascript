<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="weather.css" />
    <title>Weather App</title>
  </head>
  <body>
    <header class="navbar">
      <input id="searchBar" type="text" placeholder="Search for location" />
      <button id="searchBtn">🔍︎</button>
    </header>

    <main class="container">
      <div id="info">
        <div id="city">Lahore</div>
        <div id="temp">
          <div id="degree">40*</div>
          <div id="feelslike">Feels like 42*</div>
        </div>
        <div id="additional-info">
          <div id="wind">Wind: 3km/h</div>
          <div id="humidity">Humidity: 90%</div>
        </div>
      </div>
      <div class="Cards">
        <!-- Card 1 -->
        <div class="card" id="card1">
          <div class="card-title">Today</div>
          <div class="weather-emoji">☀️</div>
          <!-- New Emoji Div -->
          <div class="temperature">40°</div>
          <div class="variation">37°/45°</div>
          <div class="oneliner">Sunny</div>
        </div>

        <!-- Card 2 -->
        <div class="card" id="card2">
          <div class="card-title">Tomorrow</div>
          <div class="weather-emoji">☁️</div>
          <!-- New Emoji Div -->
          <div class="temperature">32°</div>
          <div class="variation">28°/35°</div>
          <div class="oneliner">Cloudy</div>
        </div>

        <!-- Card 3 -->
        <div class="card" id="card3">
          <div class="card-title">Friday</div>
          <div class="weather-emoji">🌧️</div>
          <!-- New Emoji Div -->
          <div class="temperature">25°</div>
          <div class="variation">22°/27°</div>
          <div class="oneliner">Rainy</div>
        </div>
        <!-- Card 4 -->
        <div class="card" id="card4">
          <div class="card-title">Friday</div>
          <div class="weather-emoji">🌧️</div>
          <!-- New Emoji Div -->
          <div class="temperature">25°</div>
          <div class="variation">22°/27°</div>
          <div class="oneliner">Rainy</div>
        </div>
        <!-- Card 5 -->
        <div class="card" id="card5">
          <div class="card-title">Friday</div>
          <div class="weather-emoji">🌧️</div>
          <!-- New Emoji Div -->
          <div class="temperature">25°</div>
          <div class="variation">22°/27°</div>
          <div class="oneliner">Rainy</div>
        </div>
        <!-- Card 6 -->
        <div class="card" id="card6">
          <div class="card-title">Friday</div>
          <div class="weather-emoji">🌧️</div>
          <!-- New Emoji Div -->
          <div class="temperature">25°</div>
          <div class="variation">22°/27°</div>
          <div class="oneliner">Rainy</div>
        </div>
        <!-- Card 7 -->
        <div class="card" id="card7">
          <div class="card-title">Friday</div>
          <div class="weather-emoji">🌧️</div>
          <!-- New Emoji Div -->
          <div class="temperature">25°</div>
          <div class="variation">22°/27°</div>
          <div class="oneliner">Rainy</div>
        </div>
      </div>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
